server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ============================================
    # DOCKER FIX - sendfile off
    # ============================================
    # Docker volume-okkal sendfile problémás lehet
    sendfile off;
    tcp_nopush off;
    tcp_nodelay on;

    # ============================================
    # SECURITY HEADERS
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ============================================
    # GZIP COMPRESSION
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ============================================
    # STATIC ASSETS (képek, fontok, stb.)
    # ============================================
    location /assets/ {
        # 1 éves cache (immutable fájlok)
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Partial content támogatás kikapcsolása (Docker fix)
        add_header Accept-Ranges "none";

        # Gzip kikapcsolása már tömörített fájloknál (jpg, png, woff2)
        gzip off;

        # Ha nem található, 404
        try_files $uri =404;
    }

    # ============================================
    # JAVASCRIPT/CSS FÁJLOK
    # ============================================
    location ~* \.(js|css)$ {
        # Rövid cache (ha van hash a fájlnévben, lehet hosszabb)
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Gzip engedélyezése
        gzip on;
    }

    # ============================================
    # ANGULAR ROUTING (SPA)
    # ============================================
    location / {
        # Próbáld meg a fájlt, ha nincs → index.html (SPA routing)
        try_files $uri $uri/ /index.html;

        # index.html NE legyen cache-elve (mindig friss verzió)
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ============================================
    # ERROR HANDLING
    # ============================================
    error_page 404 /index.html;

    # ============================================
    # LOGGING
    # ============================================
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
